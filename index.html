<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retail Support CRM - Exact Excel Replica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Library untuk menampilkan Diagram / Chart di Dashboard -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --bg-dark: #0f172a; --bg-panel: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --border: #334155; --accent: #10b981; --accent-hover: #059669; --danger: #ef4444; }
    body { background-color: var(--bg-dark); color: var(--text-main); font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif; overflow-x: hidden; }
    .sidebar { background-color: var(--bg-panel); border-right: 1px solid var(--border); }
    .nav-btn { display: block; width: 100%; text-align: left; padding: 12px 20px; color: var(--text-muted); border-left: 3px solid transparent; cursor: pointer; transition: 0.2s; }
    .nav-btn:hover { background-color: rgba(255,255,255,0.05); }
    .nav-btn.active { background-color: rgba(16, 185, 129, 0.1); color: var(--accent); border-left-color: var(--accent); font-weight: 600; }
    .card { background-color: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
    .input-field { width: 100%; background-color: #0f172a; border: 1px solid var(--border); color: white; padding: 8px 12px; border-radius: 6px; margin-top: 4px; }
    .input-field:focus { outline: none; border-color: var(--accent); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background-color: #0f172a; color: var(--text-muted); padding: 12px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tr:hover td { background-color: rgba(255,255,255,0.02); }
    .btn { padding: 8px 16px; border-radius: 6px; font-weight: 500; cursor: pointer; }
    .btn-primary { background-color: var(--accent); color: white; border: none; }
    .btn-primary:hover { background-color: var(--accent-hover); }
    .badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; align-items: center; justify-content: center; }
    .modal-content { background-color: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto; padding: 24px; }
  </style>
</head>
<body class="flex h-screen">

  <!-- SIDEBAR -->
  <aside class="sidebar w-64 flex-shrink-0 flex flex-col">
    <div class="p-6 border-b border-[var(--border)]">
      <h1 class="text-xl font-bold tracking-wider text-[var(--accent)]">RETAIL SUPPORT</h1>
    </div>
    <nav class="flex-1 py-4">
      <button class="nav-btn active" onclick="navigate('dashboard', this)">Dashboard</button>
      <button class="nav-btn" onclick="navigate('setup', this)">Setup</button>
      <button class="nav-btn" onclick="navigate('daftartoko', this)">Daftar Toko</button>
      <button class="nav-btn" onclick="navigate('visitplan', this)">Visit Plan</button>
      <button class="nav-btn" onclick="navigate('aktifitas', this)">Aktifitas</button>
      <button class="nav-btn" onclick="navigate('intelejen', this)">Intelegence Report</button>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 overflow-auto p-8" id="app-content">
    <!-- Rendered via JS -->
  </main>

  <!-- MODAL -->
  <div class="modal" id="modal">
    <div class="modal-content" id="modal-body"></div>
  </div>

  <script>
    // =========================================================================
    // 1. DATA INITIALIZATION (EXACTLY MATCHING EXCEL DATA & DROP-DOWNS)
    // =========================================================================
    
    // Auto-Healing: Membersihkan cache browser lama yang merusak sistem
    if(localStorage.getItem('crm_version') !== 'FINAL_V3') {
      localStorage.clear();
      localStorage.setItem('crm_version', 'FINAL_V3');
    }

    const INIT_SETUP = {
      STATUS_TOKO: ['Prospect', 'Cold Lead', 'Warm Lead', 'Hot Lead', 'Customer', 'Inactive'],
      JENIS_KUNJUNGAN: ['Kunjungan Fisik', 'Remote Coverage (Call/WA)', 'Canvasing', 'Meeting'],
      ORDER_KE: ['Mustika Aroma', 'Harum Wangi', 'Kantor'],
      KATEGORI_SAMPLING: ['New Product', 'Fast Moving', 'Slow Moving', 'Tidak Sampling'],
      KOMPETITOR: ['Parfarome', 'Iberchem', 'Macbrame', 'Lain-lain'],
      AKTIVITAS_KOMPETITOR: ['Banting Harga', 'Promo Bundling', 'Harga Pasar', 'Materi Promosi', 'Lain-lain'],
      KELUHAN_FEEDBACK: ['Kualitas Produk', 'Logistik', 'Layanan Agen', 'Tidak ada keluhan'],
      PIC: ['Ali', 'Thia'],
      AKTIFITAS: ['Observasi Pasar', 'Penanganan Keluhan (Issue)', 'Pengecekan Rutin/Maintenance', 'Edukasi Produk', 'Monitoring Order']
    };

    const INIT_TOKO = [
      { contactId: 'CRT00401', namaToko: 'Aneka Parfume Luzi', contactPerson: 'Susgiharti', jobTitle: 'Owner', phone: '085776252898', location: 'Jakarta', orderKe: 'Kantor', status: 'Customer', jenisKunjungan: 'Kunjungan Fisik', pic: 'Ali', mapsLink: 'http://...', targetKunjungan: 4, lastVisit: '2026-06-01', kodeKontak: '[CRT00401] Susgiharti' },
      { contactId: 'RTL068', namaToko: 'Toko Rehlah', contactPerson: 'Alkaff', jobTitle: 'Owner', phone: '08123456789', location: 'Jakarta', orderKe: 'Mustika Aroma', status: 'Warm Lead', jenisKunjungan: 'Kunjungan Fisik', pic: 'Thia', mapsLink: '', targetKunjungan: 2, lastVisit: '2026-05-20', kodeKontak: '[RTL068] Alkaff' }
    ];

    const INIT_PLAN = [
      { id: 'VP01', kontakToko: '[RTL068] Alkaff', namaToko: 'Toko Rehlah', tujuanKunjungan: 'Observasi Pasar', pic: 'Thia', planDate: '2026-05-20', actualDate: '2026-05-20', priority: 'High', status: 'Visited', keterangan: 'Cek display produk', daysUntilDue: 'Done' }
    ];

    const INIT_AKTIFITAS = [
      { id: 'ACT01', visitId: 'VP01', kontakToko: '[RTL068] Alkaff', namaToko: 'Toko Rehlah', tanggalKunjungan: '2026-05-20', orderKe: 'Mustika Aroma', jenisKunjungan: 'Kunjungan Fisik', aktifitas: 'Observasi Pasar', kategoriSampling: 'Tidak Sampling', sampleDescription: '', size: '', keluhanFeedback: 'Logistik', linkFoto: 'http://...', keterangan: 'Pengiriman telat 2 hari', status: 'Completed' }
    ];

    const INIT_INTEL = [
      { id: 'INT01', date: '2026-05-20', kontakToko: '[RTL068] Alkaff', namaToko: 'Toko Rehlah', kompetitor: 'Parfarome', aktivitasKompetitor: 'Banting Harga', keteranganDetail: 'Parfarome rata rata turun harga Kisaran 15%' }
    ];

    function getDB(key, defaultData) {
      if(!localStorage.getItem(key)) localStorage.setItem(key, JSON.stringify(defaultData));
      return JSON.parse(localStorage.getItem(key));
    }
    function setDB(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

    // Init Load Data
    let db = {
      setup: getDB('db_setup', INIT_SETUP),
      toko: getDB('db_toko', INIT_TOKO),
      plan: getDB('db_plan', INIT_PLAN),
      aktifitas: getDB('db_aktifitas', INIT_AKTIFITAS),
      intel: getDB('db_intel', INIT_INTEL)
    };

    // Auto Calculate Overdue Plans on Every Refresh
    const todayStr = new Date().toISOString().split('T')[0];
    db.plan.forEach(p => {
        if(p.status !== 'Visited') {
            p.status = (p.planDate < todayStr) ? 'Overdue' : 'Scheduled';
        }
        let d1 = new Date(todayStr);
        let d2 = new Date(p.planDate);
        let diff = Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24));
        p.daysUntilDue = (p.status === 'Visited') ? 'Done' : diff;
    });
    setDB('db_plan', db.plan);

    // =========================================================================
    // 2. CORE SYSTEM FUNCTIONS
    // =========================================================================
    function navigate(page, btnElement) {
      if(btnElement) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btnElement.classList.add('active');
      }
      const content = document.getElementById('app-content');

      if(page === 'dashboard') renderDashboard(content);
      if(page === 'setup') renderSetup(content);
      if(page === 'daftartoko') renderDaftarToko(content);
      if(page === 'visitplan') renderVisitPlan(content);
      if(page === 'aktifitas') renderAktifitas(content);
      if(page === 'intelejen') renderIntelejen(content);
    }

    function openModal(html) {
      document.getElementById('modal-body').innerHTML = html;
      document.getElementById('modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    // Dropdown Generator (Reads from Setup Array)
    function optionsHtml(arrayData, selectedValue = '') {
      return arrayData.map(val => `<option value="${val}" ${val === selectedValue ? 'selected' : ''}>${val}</option>`).join('');
    }
    function generateId(prefix) { return prefix + Math.random().toString(36).substr(2, 5).toUpperCase(); }

    // Deletion Handlers
    function delToko(id) { if(confirm('Hapus Toko ini?')) { db.toko = db.toko.filter(t => t.contactId !== id); setDB('db_toko', db.toko); renderDaftarToko(document.getElementById('app-content')); } }
    function delPlan(id) { if(confirm('Hapus Visit Plan ini?')) { db.plan = db.plan.filter(p => p.id !== id); setDB('db_plan', db.plan); renderVisitPlan(document.getElementById('app-content')); } }
    function delAktifitas(id) { if(confirm('Hapus Aktifitas ini?')) { db.aktifitas = db.aktifitas.filter(a => a.id !== id); setDB('db_aktifitas', db.aktifitas); renderAktifitas(document.getElementById('app-content')); } }
    function delIntel(id) { if(confirm('Hapus Report ini?')) { db.intel = db.intel.filter(i => i.id !== id); setDB('db_intel', db.intel); renderIntelejen(document.getElementById('app-content')); } }

    // =========================================================================
    // 3. DASHBOARD (WITH CHARTS)
    // =========================================================================
    function renderDashboard(c) {
      // Calculate Metrics
      let totalToko = db.toko.filter(t => t.status !== 'Inactive').length;
      let targetKunjungan = db.toko.reduce((a,b)=>a+Number(b.targetKunjungan||0),0);
      let visitedCount = db.plan.filter(p=>p.status==='Visited').length;
      let scheduledCount = db.plan.filter(p=>p.status==='Scheduled').length;
      let overdueCount = db.plan.filter(p=>p.status==='Overdue').length;
      let issueCount = db.aktifitas.filter(a=>a.keluhanFeedback && a.keluhanFeedback !== 'Tidak ada keluhan').length;
      
      // Calculate Competitor Metric
      let compData = {};
      db.intel.forEach(i => { let k = i.kompetitor || 'Unknown'; compData[k] = (compData[k] || 0) + 1; });

      c.innerHTML = `
        <h1 class="text-3xl font-bold mb-6">Dashboard Summary</h1>
        
        <div class="grid grid-cols-4 gap-4 mb-8">
          <div class="card border-l-4 border-[var(--info)]"><p class="text-xs text-[var(--text-muted)]">TOTAL TOKO AKTIF</p><h2 class="text-2xl font-bold">${totalToko}</h2></div>
          <div class="card border-l-4 border-blue-500"><p class="text-xs text-[var(--text-muted)]">TARGET KUNJUNGAN</p><h2 class="text-2xl font-bold text-blue-400">${targetKunjungan}</h2></div>
          <div class="card border-l-4 border-[var(--accent)]"><p class="text-xs text-[var(--text-muted)]">REALISASI KUNJUNGAN</p><h2 class="text-2xl font-bold text-green-400">${visitedCount}</h2></div>
          <div class="card border-l-4 border-[var(--danger)]"><p class="text-xs text-[var(--text-muted)]">ISSUE/KELUHAN TERCATAT</p><h2 class="text-2xl font-bold text-[var(--danger)]">${issueCount}</h2></div>
        </div>

        <div class="grid grid-cols-2 gap-6 mb-8">
            <div class="card h-80 flex flex-col">
                <h3 class="font-bold mb-4">Grafik Status Visit Plan</h3>
                <div class="flex-1 relative w-full h-full"><canvas id="chartKunjungan"></canvas></div>
            </div>
            <div class="card h-80 flex flex-col">
                <h3 class="font-bold mb-4">Frekuensi Laporan Kompetitor</h3>
                <div class="flex-1 relative w-full h-full"><canvas id="chartKompetitor"></canvas></div>
            </div>
        </div>

        <div class="card">
          <h3 class="font-bold mb-4">RECENT ACTIVITY</h3>
          <div class="overflow-x-auto">
          <table>
            <thead><tr><th>NAMA TOKO</th><th>TGL KUNJUNGAN</th><th>JENIS KUNJUNGAN</th><th>AKTIFITAS</th><th>STATUS</th></tr></thead>
            <tbody>${db.aktifitas.slice(-5).reverse().map(a => `<tr><td>${a.namaToko}</td><td>${a.tanggalKunjungan}</td><td>${a.jenisKunjungan}</td><td><span class="badge" style="background:#1e3a8a">${a.aktifitas}</span></td><td><span class="badge" style="background:var(--accent)">${a.status}</span></td></tr>`).join('')}</tbody>
          </table>
          </div>
        </div>
      `;

      // Render Charts Delay (To Ensure DOM is Ready)
      setTimeout(() => {
        let ctxK = document.getElementById('chartKunjungan');
        if(ctxK) {
            new Chart(ctxK, {
                type: 'doughnut',
                data: {
                    labels: ['Visited', 'Scheduled', 'Overdue'],
                    datasets: [{ data: [visitedCount, scheduledCount, overdueCount], backgroundColor: ['#10b981', '#3b82f6', '#ef4444'], borderWidth: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: {color: '#f8fafc'} } } }
            });
        }
        let ctxC = document.getElementById('chartKompetitor');
        if(ctxC) {
            new Chart(ctxC, {
                type: 'bar',
                data: {
                    labels: Object.keys(compData).length ? Object.keys(compData) : ['Belum Ada'],
                    datasets: [{ label: 'Jumlah Laporan', data: Object.keys(compData).length ? Object.values(compData) : [0], backgroundColor: '#f59e0b' }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: {color: '#94a3b8'} }, x: { ticks: {color: '#94a3b8'} } }, plugins: { legend: { display: false } } }
            });
        }
      }, 100);
    }

    // =========================================================================
    // 4. SETUP MODULE (CRUD Master Data - FULL FUNCTIONAL)
    // =========================================================================
    function renderSetup(c) {
      let html = `<div class="flex justify-between items-center mb-6"><h1 class="text-3xl font-bold">Setup Master Data (Dropdown List)</h1></div><div class="grid grid-cols-2 lg:grid-cols-3 gap-6">`;
      
      for(let key in db.setup) {
        let displayKey = key.replace(/_/g, ' ');
        html += `<div class="card flex flex-col h-full"><div class="flex justify-between items-center mb-4"><h3 class="font-bold text-[var(--accent)] text-lg">${displayKey}</h3><button onclick="addSetup('${key}')" class="text-xs btn-primary px-3 py-1 rounded shadow">+ Add</button></div><ul class="text-sm flex-1 overflow-y-auto max-h-60 pr-2">`;
        
        if (db.setup[key].length === 0) { html += `<li class="text-[var(--text-muted)] italic">Belum ada data</li>`; }
        
        db.setup[key].forEach((item, index) => {
          html += `<li class="flex justify-between items-center border-b border-[var(--border)] py-2 group"><span class="truncate pr-2">${item}</span><button onclick="delSetup('${key}', ${index})" class="text-[var(--danger)] text-xs font-bold px-2 py-1 bg-red-900/20 rounded">Hapus</button></li>`;
        });
        html += `</ul></div>`;
      }
      c.innerHTML = html + `</div>`;
    }

    function addSetup(key) {
      openModal(`
        <h2 class="text-xl font-bold mb-4">Tambah Master Data: ${key.replace(/_/g, ' ')}</h2>
        <input type="text" id="setupVal" class="input-field mb-4" placeholder="Masukkan pilihan baru...">
        <div class="flex gap-2"><button onclick="closeModal()" class="btn" style="background:var(--border)">Batal</button><button onclick="saveSetup('${key}')" class="btn btn-primary">Simpan Master Data</button></div>
      `);
    }
    function saveSetup(key) {
      let val = document.getElementById('setupVal').value;
      if(val) { db.setup[key].push(val); setDB('db_setup', db.setup); closeModal(); renderSetup(document.getElementById('app-content')); }
    }
    function delSetup(key, idx) {
      if(confirm('Hapus item pilihan ini? Pilihan ini tidak akan muncul lagi di Form.')) { db.setup[key].splice(idx, 1); setDB('db_setup', db.setup); renderSetup(document.getElementById('app-content')); }
    }

    // =========================================================================
    // 5. DAFTAR TOKO (Master Toko)
    // =========================================================================
    function renderDaftarToko(c) {
      let rows = db.toko.map(t => `<tr><td>${t.contactId}</td><td class="font-bold">${t.namaToko}</td><td>${t.contactPerson}</td><td>${t.orderKe}</td><td><span class="badge" style="background:${t.status==='Active'||t.status==='Customer'?'var(--accent)':'var(--danger)'}">${t.status}</span></td><td>${t.jenisKunjungan}</td><td>${t.pic}</td><td>${t.targetKunjungan}</td><td>${t.lastVisit || '-'}</td><td>${t.kodeKontak}</td><td><button onclick="delToko('${t.contactId}')" class="text-xs text-[var(--danger)] font-bold">Del</button></td></tr>`).join('');
      c.innerHTML = `<div class="flex justify-between items-center mb-6"><h1 class="text-3xl font-bold">Daftar Toko</h1><button onclick="formToko()" class="btn btn-primary">+ Add Toko Baru</button></div><div class="card overflow-x-auto"><table><thead><tr><th>CONTACT ID</th><th>NAMA TOKO</th><th>CONTACT PERSON</th><th>ORDER KE</th><th>STATUS</th><th>JENIS KUNJUNGAN</th><th>PIC</th><th>TARGET</th><th>LAST VISIT</th><th>KODE KONTAK</th><th>ACTION</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }

    function formToko() {
      openModal(`
        <h2 class="text-xl font-bold mb-4">Form Tambah Daftar Toko</h2>
        <form onsubmit="saveToko(event)">
          <div class="grid grid-cols-2 gap-4 mb-4">
            <div><label class="text-xs">CONTACT ID *</label><input required name="contactId" class="input-field" placeholder="Contoh: CRT001"></div>
            <div><label class="text-xs">NAMA TOKO *</label><input required name="namaToko" class="input-field" placeholder="Contoh: Toko Sejahtera"></div>
            <div><label class="text-xs">CONTACT PERSON</label><input name="contactPerson" class="input-field"></div>
            <div><label class="text-xs">JOB TITLE</label><input name="jobTitle" class="input-field"></div>
            <div><label class="text-xs">PHONE</label><input name="phone" class="input-field"></div>
            <div><label class="text-xs">LOCATION</label><input name="location" class="input-field"></div>
            
            <!-- EXCEL FUNCTION: DROPDOWN VALIDATION FROM SETUP DB -->
            <div><label class="text-xs text-[var(--accent)]">ORDER KE (Sourced from Setup)</label><select name="orderKe" class="input-field">${optionsHtml(db.setup.ORDER_KE)}</select></div>
            <div><label class="text-xs text-[var(--accent)]">STATUS TOKO (Sourced from Setup)</label><select name="status" class="input-field">${optionsHtml(db.setup.STATUS_TOKO)}</select></div>
            <div><label class="text-xs text-[var(--accent)]">JENIS KUNJUNGAN (Sourced from Setup)</label><select name="jenisKunjungan" class="input-field">${optionsHtml(db.setup.JENIS_KUNJUNGAN)}</select></div>
            <div><label class="text-xs text-[var(--accent)]">PIC (Sourced from Setup)</label><select name="pic" class="input-field">${optionsHtml(db.setup.PIC)}</select></div>
            
            <div><label class="text-xs">MAPS LINK</label><input name="mapsLink" class="input-field"></div>
            <div><label class="text-xs">TARGET KUNJUNGAN PER BULAN</label><input required type="number" name="targetKunjungan" class="input-field" value="1"></div>
          </div>
          <div class="flex gap-2 pt-2 border-t border-[var(--border)]"><button type="button" onclick="closeModal()" class="btn" style="background:var(--border)">Batal</button><button type="submit" class="btn btn-primary">Simpan Toko Master</button></div>
        </form>
      `);
    }

    function saveToko(e) {
      e.preventDefault();
      let obj = Object.fromEntries(new FormData(e.target));
      obj.lastVisit = ''; 
      obj.kodeKontak = `[${obj.contactId}] ${obj.contactPerson}`;
      db.toko.push(obj); setDB('db_toko', db.toko);
      closeModal(); renderDaftarToko(document.getElementById('app-content'));
    }

    // =========================================================================
    // 6. VISIT PLAN
    // =========================================================================
    function renderVisitPlan(c) {
      let rows = db.plan.map(p => `<tr><td>${p.kontakToko}</td><td class="font-bold text-blue-300">${p.namaToko}</td><td>${p.tujuanKunjungan}</td><td>${p.pic}</td><td>${p.planDate}</td><td>${p.actualDate||'-'}</td><td>${p.priority}</td><td><span class="badge" style="background:${p.status==='Visited'?'var(--accent)':(p.status==='Overdue'?'var(--danger)':'var(--warning)')}">${p.status}</span></td><td>${p.keterangan}</td><td>${p.daysUntilDue}</td><td><button onclick="delPlan('${p.id}')" class="text-xs text-[var(--danger)] font-bold">Del</button></td></tr>`).join('');
      c.innerHTML = `<div class="flex justify-between items-center mb-6"><h1 class="text-3xl font-bold">Visit Plan</h1><button onclick="formPlan()" class="btn btn-primary">+ Create Visit Plan</button></div><div class="card overflow-x-auto"><table><thead><tr><th>KONTAK TOKO</th><th>NAMA TOKO</th><th>TUJUAN KUNJUNGAN</th><th>PIC</th><th>PLAN DATE</th><th>ACTUAL DATE</th><th>PRIORITY</th><th>STATUS</th><th>KETERANGAN</th><th>DAYS UNTIL DUE</th><th>ACT</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }

    function formPlan() {
      // VLOOKUP FUNCTIONALITY: Kontak Toko diisi dari master Daftar Toko
      let tokoOptions = db.toko.map(t => `<option value="${t.kodeKontak}" data-nama="${t.namaToko}">${t.kodeKontak} - ${t.namaToko}</option>`).join('');
      
      openModal(`
        <h2 class="text-xl font-bold mb-4">Form Rencana Kunjungan (Visit Plan)</h2>
        <form onsubmit="savePlan(event)">
          <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="col-span-2"><label class="text-xs text-[var(--accent)]">PILIH TOKO DARI MASTER * (Otomatis mengisi Nama Toko)</label>
              <select required name="kontakToko" class="input-field" onchange="document.getElementById('vpNama').value = this.options[this.selectedIndex].dataset.nama">
                <option value="">Pilih Toko Master...</option>${tokoOptions}
              </select>
              <input type="hidden" name="namaToko" id="vpNama">
            </div>
            
            <!-- EXCEL FUNCTION: DROPDOWNS SOURCED FROM SETUP -->
            <div><label class="text-xs text-[var(--accent)]">TUJUAN KUNJUNGAN (Dari Setup Aktifitas)</label><select name="tujuanKunjungan" class="input-field">${optionsHtml(db.setup.AKTIFITAS)}</select></div>
            <div><label class="text-xs text-[var(--accent)]">PIC JADWAL (Dari Setup PIC)</label><select name="pic" class="input-field">${optionsHtml(db.setup.PIC)}</select></div>
            
            <div><label class="text-xs">PLAN DATE *</label><input required type="date" name="planDate" class="input-field"></div>
            <div><label class="text-xs">PRIORITY</label><select name="priority" class="input-field"><option>High</option><option>Medium</option><option>Low</option></select></div>
            <div class="col-span-2"><label class="text-xs">KETERANGAN / CATATAN JADWAL</label><input name="keterangan" class="input-field"></div>
          </div>
          <div class="flex gap-2 pt-2 border-t border-[var(--border)]"><button type="button" onclick="closeModal()" class="btn" style="background:var(--border)">Batal</button><button type="submit" class="btn btn-primary">Simpan Rencana Visit</button></div>
        </form>
      `);
    }

    function savePlan(e) {
      e.preventDefault();
      let obj = Object.fromEntries(new FormData(e.target));
      obj.id = generateId('VP'); obj.actualDate = ''; obj.status = 'Scheduled'; obj.daysUntilDue = '0';
      
      // Hitung ulang Days Due langsung
      let d1 = new Date(todayStr); let d2 = new Date(obj.planDate);
      obj.daysUntilDue = Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24));
      if (obj.planDate < todayStr) obj.status = 'Overdue';

      db.plan.push(obj); setDB('db_plan', db.plan);
      closeModal(); renderVisitPlan(document.getElementById('app-content'));
    }

    // =========================================================================
    // 7. AKTIFITAS (Data-Journey: Logic Otomatis Write-back ke Plan & Toko)
    // =========================================================================
    function renderAktifitas(c) {
      let rows = db.aktifitas.map(a => `<tr><td>${a.kontakToko}</td><td class="font-bold text-[var(--accent)]">${a.namaToko}</td><td>${a.tanggalKunjungan}</td><td>${a.orderKe}</td><td>${a.jenisKunjungan}</td><td>${a.aktifitas}</td><td>${a.kategoriSampling}</td><td>${a.sampleDescription}</td><td>${a.size}</td><td class="text-[var(--danger)] font-bold">${a.keluhanFeedback}</td><td>${a.linkFoto?'Terlampir':'-'}</td><td>${a.keterangan}</td><td><span class="badge bg-green-600">${a.status}</span></td><td><button onclick="delAktifitas('${a.id}')" class="text-xs text-[var(--danger)] font-bold">Del</button></td></tr>`).join('');
      c.innerHTML = `<div class="flex justify-between items-center mb-6"><h1 class="text-3xl font-bold">Log Aktifitas Kunjungan</h1><button onclick="formAktifitas()" class="btn btn-primary">+ Lapor Aktifitas Visit</button></div><div class="card overflow-x-auto"><table><thead><tr><th>KONTAK TOKO</th><th>NAMA TOKO</th><th>TANGGAL KUNJUNGAN</th><th>ORDER KE</th><th>JENIS KUNJUNGAN</th><th>AKTIFITAS</th><th>KATEGORI SAMPLING</th><th>SAMPLE DESCRIPTION</th><th>SIZE</th><th>KELUHAN & FEEDBACK</th><th>LINK FOTO</th><th>KETERANGAN</th><th>STATUS</th><th>ACT</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }

    function formAktifitas() {
      // Ambil Plan yang BUKAN status Visited
      let planOptions = db.plan.filter(p=>p.status!=='Visited').map(p => `<option value="${p.id}" data-kontak="${p.kontakToko}" data-nama="${p.namaToko}">${p.planDate} | ${p.namaToko} - ${p.tujuanKunjungan}</option>`).join('');

      openModal(`
        <h2 class="text-xl font-bold mb-4">Laporan Hasil Visit (Aktifitas)</h2>
        <form onsubmit="saveAktifitas(event)">
          <div class="p-3 bg-blue-900/30 border border-blue-500 rounded mb-4 text-sm text-blue-200"><b>DATA JOURNEY WORKFLOW:</b> Memilih Visit Plan di bawah akan otomatis mengubah status Rencana Kunjungan menjadi <b>Visited</b> dan menghitung <b>Last Visit</b> pada data Master Toko.</div>
          
          <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="col-span-2"><label class="text-xs">PILIH VISIT PLAN YANG SUDAH DIJADWALKAN *</label>
              <select required name="visitId" class="input-field" onchange="autoFillVisitData(this)">
                <option value="">-- Pilih Jadwal Plan Terbuka --</option>${planOptions}
              </select>
              <input type="hidden" name="kontakToko" id="actKontak"><input type="hidden" name="namaToko" id="actNama">
            </div>

            <div><label class="text-xs">TANGGAL KUNJUNGAN AKTUAL *</label><input type="date" required name="tanggalKunjungan" class="input-field" value="${new Date().toISOString().split('T')[0]}"></div>
            
            <!-- ALL EXCEL DROPDOWNS SOURCED FROM SETUP.CSV -->
            <div><label class="text-xs text-[var(--accent)]">ORDER KE (Master Data)</label><select name="orderKe" class="input-field">${optionsHtml(db.setup.ORDER_KE)}</select></div>
            <div><label class="text-xs text-[var(--accent)]">JENIS KUNJUNGAN (Master Data)</label><select name="jenisKunjungan" class="input-field">${optionsHtml(db.setup.JENIS_KUNJUNGAN)}</select></div>
            <div><label class="text-xs text-[var(--accent)]">AKTIFITAS (Master Data)</label><select name="aktifitas" class="input-field">${optionsHtml(db.setup.AKTIFITAS)}</select></div>
            <div><label class="text-xs text-[var(--accent)]">KATEGORI SAMPLING (Master Data)</label><select name="kategoriSampling" class="input-field">${optionsHtml(db.setup.KATEGORI_SAMPLING)}</select></div>
            <div><label class="text-xs text-[var(--accent)]">KELUHAN & FEEDBACK (Master Data)</label><select name="keluhanFeedback" class="input-field">${optionsHtml(db.setup.KELUHAN_FEEDBACK)}</select></div>
            
            <div><label class="text-xs">SAMPLE DESCRIPTION</label><input name="sampleDescription" class="input-field" placeholder="Contoh: Tester Parfum X"></div>
            <div><label class="text-xs">SIZE</label><input name="size" class="input-field" placeholder="Contoh: 50ml"></div>
            <div><label class="text-xs">LINK FOTO KUNJUNGAN</label><input name="linkFoto" class="input-field"></div>
            <div><label class="text-xs">KETERANGAN TAMBAHAN</label><input name="keterangan" class="input-field"></div>
          </div>
          <div class="flex gap-2 pt-2 border-t border-[var(--border)]"><button type="button" onclick="closeModal()" class="btn" style="background:var(--border)">Batal</button><button type="submit" class="btn btn-primary">Simpan Laporan Visit</button></div>
        </form>
      `);
    }

    function autoFillVisitData(sel) {
      let opt = sel.options[sel.selectedIndex];
      if(opt.value) {
        document.getElementById('actKontak').value = opt.dataset.kontak || '';
        document.getElementById('actNama').value = opt.dataset.nama || '';
      } else {
        document.getElementById('actKontak').value = '';
        document.getElementById('actNama').value = '';
      }
    }

    function saveAktifitas(e) {
      e.preventDefault();
      let obj = Object.fromEntries(new FormData(e.target));
      obj.id = generateId('ACT'); obj.status = 'Completed';
      db.aktifitas.push(obj); setDB('db_aktifitas', db.aktifitas);

      // DATA JOURNEY WORKFLOW EXECUTION: Update Visit Plan -> Set Visited & Actual Date
      let pIdx = db.plan.findIndex(p => p.id === obj.visitId);
      if(pIdx > -1) { db.plan[pIdx].status = 'Visited'; db.plan[pIdx].actualDate = obj.tanggalKunjungan; db.plan[pIdx].daysUntilDue = 'Done'; setDB('db_plan', db.plan); }

      // DATA JOURNEY WORKFLOW EXECUTION: Update Master Toko -> Set Last Visit Date
      let tIdx = db.toko.findIndex(t => t.kodeKontak === obj.kontakToko);
      if(tIdx > -1) { db.toko[tIdx].lastVisit = obj.tanggalKunjungan; setDB('db_toko', db.toko); }

      closeModal(); renderAktifitas(document.getElementById('app-content'));
    }

    // =========================================================================
    // 8. INTELEGENCE REPORT
    // =========================================================================
    function renderIntelejen(c) {
      let rows = db.intel.map(i => `<tr><td>${i.date}</td><td>${i.kontakToko}</td><td class="font-bold">${i.namaToko}</td><td class="text-[var(--danger)] font-bold">${i.kompetitor}</td><td>${i.aktivitasKompetitor}</td><td>${i.keteranganDetail}</td><td><button onclick="delIntel('${i.id}')" class="text-xs text-[var(--danger)] font-bold">Del</button></td></tr>`).join('');
      c.innerHTML = `<div class="flex justify-between items-center mb-6"><h1 class="text-3xl font-bold">Intelegence Report</h1><button onclick="formIntel()" class="btn btn-primary">+ Add Report Kompetitor</button></div><div class="card overflow-x-auto"><table><thead><tr><th>DATE</th><th>KONTAK TOKO</th><th>NAMA TOKO</th><th>KOMPETITOR</th><th>AKTIVITAS KOMPETITOR</th><th>KETERANGAN DETAIL</th><th>ACT</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }

    function formIntel() {
      let tokoOptions = db.toko.map(t => `<option value="${t.kodeKontak}" data-nama="${t.namaToko}">${t.kodeKontak} - ${t.namaToko}</option>`).join('');
      openModal(`
        <h2 class="text-xl font-bold mb-4">Form Intelejen Kompetitor</h2>
        <form onsubmit="saveIntel(event)">
          <div class="grid grid-cols-2 gap-4 mb-4">
            <div><label class="text-xs">DATE *</label><input type="date" required name="date" class="input-field" value="${new Date().toISOString().split('T')[0]}"></div>
            <div><label class="text-xs">PILIH KONTAK TOKO *</label>
              <select required name="kontakToko" class="input-field" onchange="document.getElementById('intNama').value = this.options[this.selectedIndex].dataset.nama">
                <option value="">Pilih Toko...</option>${tokoOptions}
              </select>
              <input type="hidden" name="namaToko" id="intNama">
            </div>
            
            <!-- EXCEL FUNCTION: DROPDOWNS SOURCED FROM SETUP DB -->
            <div><label class="text-xs text-[var(--accent)]">NAMA KOMPETITOR (Setup Data)</label><select name="kompetitor" class="input-field">${optionsHtml(db.setup.KOMPETITOR)}</select></div>
            <div><label class="text-xs text-[var(--accent)]">AKTIVITAS KOMPETITOR (Setup Data)</label><select name="aktivitasKompetitor" class="input-field">${optionsHtml(db.setup.AKTIVITAS_KOMPETITOR)}</select></div>
            
            <div class="col-span-2"><label class="text-xs">KETERANGAN DETAIL (Narasi Laporan)</label><input name="keteranganDetail" class="input-field" required></div>
          </div>
          <div class="flex gap-2 pt-2 border-t border-[var(--border)]"><button type="button" onclick="closeModal()" class="btn" style="background:var(--border)">Batal</button><button type="submit" class="btn btn-primary">Simpan Laporan Intel</button></div>
        </form>
      `);
    }

    function saveIntel(e) {
      e.preventDefault();
      let obj = Object.fromEntries(new FormData(e.target));
      obj.id = generateId('INT');
      db.intel.push(obj); setDB('db_intel', db.intel);
      closeModal(); renderIntelejen(document.getElementById('app-content'));
    }

    // Initialize App View
    window.onload = () => navigate('dashboard');
  </script>
</body>
</html>
