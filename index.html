<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Retail Support System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --bg-hover: #334155;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-light: #60a5fa;
      --border: #334155;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }
    
    body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    
    /* Layout */
    .sidebar { width: 260px; transition: transform 0.3s ease; }
    @media (max-width: 768px) { .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 50; transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } }
    
    .nav-link { display: flex; align-items: center; padding: 12px 16px; border-radius: 8px; color: var(--text-muted); transition: all 0.2s; margin: 2px 8px; }
    .nav-link:hover { background: var(--bg-hover); color: var(--text-main); }
    .nav-link.active { background: var(--accent); color: white; font-weight: 600; }
    
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; }
    .input-field { background: var(--bg-dark); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text-main); width: 100%; transition: border 0.2s; }
    .input-field:focus { outline: none; border-color: var(--accent); }
    
    .btn { padding: 10px 20px; border-radius: 8px; font-weight: 500; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-light); }
    .btn-secondary { background: var(--bg-hover); color: var(--text-main); border: 1px solid var(--border); }
    .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
    
    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px 16px; color: var(--text-muted); font-size: 12px; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid var(--border); background: var(--bg-card); }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    
    .badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge-green { background: rgba(34, 197, 94, 0.1); color: var(--success); }
    .badge-yellow { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
    .badge-red { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
    .badge-blue { background: rgba(59, 130, 246, 0.1); color: var(--accent-light); }
    
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal-backdrop.active { display: flex; }
    .modal-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
    
    .stat-card { position: relative; overflow: hidden; }
    .stat-card::before { content: ''; position: absolute; top: 0; right: 0; width: 80px; height: 80px; border-radius: 50%; filter: blur(30px); opacity: 0.1; }
    .stat-card.blue::before { background: var(--accent); }
    .stat-card.green::before { background: var(--success); }
    .stat-card.red::before { background: var(--danger); }
    .stat-card.yellow::before { background: var(--warning); }
  </style>
</head>
<body class="flex">

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar h-screen fixed left-0 top-0 bg-slate-900 border-r border-slate-700 flex flex-col z-40">
    <div class="p-6 border-b border-slate-700">
      <h1 class="text-xl font-bold text-white flex items-center gap-3">
        <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
        Retail CRM
      </h1>
      <p class="text-xs text-slate-400 mt-1">Support Management</p>
    </div>
    
    <nav class="flex-1 py-4 overflow-y-auto">
      <div class="px-4 mb-2 text-xs font-semibold text-slate-500 uppercase">Menu</div>
      <a href="#" onclick="navigate('dashboard')" class="nav-link active" data-page="dashboard">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"></path></svg>
        Dashboard
      </a>
      <a href="#" onclick="navigate('setup')" class="nav-link" data-page="setup">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        Setup
      </a>
      
      <div class="px-4 mt-6 mb-2 text-xs font-semibold text-slate-500 uppercase">Master Data</div>
      <a href="#" onclick="navigate('daftar-toko')" class="nav-link" data-page="daftar-toko">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
        Daftar Toko
      </a>
      
      <div class="px-4 mt-6 mb-2 text-xs font-semibold text-slate-500 uppercase">Operasional</div>
      <a href="#" onclick="navigate('visit-plan')" class="nav-link" data-page="visit-plan">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        Visit Plan
      </a>
      <a href="#" onclick="navigate('aktifitas')" class="nav-link" data-page="aktifitas">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
        Aktifitas
      </a>
      <a href="#" onclick="navigate('inteligence')" class="nav-link" data-page="inteligence">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
        Intelegence Report
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 md:ml-[260px] min-h-screen">
    <!-- Mobile Header -->
    <header class="md:hidden bg-slate-900 border-b border-slate-700 p-4 flex items-center justify-between sticky top-0 z-30">
      <button onclick="toggleSidebar()" class="p-2 rounded-md hover:bg-slate-800">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
      </button>
      <span class="font-bold">Retail CRM</span>
      <div class="w-10"></div>
    </header>

    <div id="app-content" class="p-4 md:p-8">
      <!-- Dynamic Content Injected Here -->
    </div>
  </main>

  <!-- Modal -->
  <div id="modal-root" class="modal-backdrop">
    <div class="modal-content">
      <div class="p-6 border-b border-slate-700 flex justify-between items-center">
        <h3 id="modal-title" class="text-lg font-bold"></h3>
        <button onclick="closeModal()" class="p-2 rounded-full hover:bg-slate-700">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      <div id="modal-body" class="p-6"></div>
      <div id="modal-footer" class="p-4 border-t border-slate-700 flex justify-end gap-3 bg-slate-800/50 rounded-b-2xl"></div>
    </div>
  </div>

  <script>
    // ==========================================
    // DATA STORE & INITIALIZATION
    // ==========================================
    
    const STORE_KEY = 'crm_data_v1';
    
    // Default Data Structure
    const defaultData = {
      setup: {
        statusToko: ['Active', 'Inactive', 'Pending', 'Closed'],
        jenisKunjungan: ['Routine Visit', 'Follow-up', 'Product Demo', 'Sampling', 'Training', 'Issue Resolution'],
        orderKe: ['1', '2', '3', '4', '5+'],
        kategoriSampling: ['Product Sample', 'Tester', 'Promotional Item', 'Gift Set'],
        taskCategories: ['Sales', 'Support', 'Delivery', 'Training'],
        kompetitor: ['Competitor A', 'Competitor B', 'Market Leader X', 'Regional Player Y'],
        users: ['John Smith', 'Sarah Johnson', 'Mike Wilson', 'Lisa Chen']
      },
      toko: [
        { id: 'RTL001', namaToko: 'Toko Sumber Wangi', contactPerson: 'Haidar Habsyi', jobTitle: 'Owner', phone: '081234567890', location: 'Bumiayu', orderKe: '1', status: 'Active', jenisKunjungan: 'Routine Visit', pic: 'John Smith', mapsLink: 'https://maps.google.com', targetKunjungan: 4, lastVisit: '2026-06-01', kodeKontak: 'RTL001-HAIDAR' },
        { id: 'RTL002', namaToko: 'Surga Parfume Cibubur', contactPerson: 'Mey Mulan', jobTitle: 'Manager', phone: '081234567891', location: 'Cibubur', orderKe: '1', status: 'Active', jenisKunjungan: 'Routine Visit', pic: 'Sarah Johnson', mapsLink: 'https://maps.google.com', targetKunjungan: 2, lastVisit: '2026-05-28', kodeKontak: 'RTL002-MEY' },
        { id: 'RTL003', namaToko: 'Wan Parfume', contactPerson: 'Abdullah', jobTitle: 'Owner', phone: '081234567892', location: 'Jakarta', orderKe: '2', status: 'Inactive', jenisKunjungan: 'Follow-up', pic: 'John Smith', mapsLink: 'https://maps.google.com', targetKunjungan: 1, lastVisit: '2026-05-20', kodeKontak: 'RTL003-ABDULLAH' }
      ],
      visitPlan: [
        { id: 'VP001', kontakToko: 'RTL001', namaToko: 'Toko Sumber Wangi', tujuanKunjungan: 'Product Demo', pic: 'John Smith', planDate: getTodayStr(2), actualDate: '', priority: 'High', keterangan: 'Demo new products' },
        { id: 'VP002', kontakToko: 'RTL002', namaToko: 'Surga Parfume Cibubur', tujuanKunjungan: 'Routine Visit', pic: 'Sarah Johnson', planDate: getTodayStr(-2), actualDate: '', priority: 'Medium', keterangan: 'Monthly check' },
        { id: 'VP003', kontakToko: 'RTL003', namaToko: 'Wan Parfume', tujuanKunjungan: 'Follow-up', pic: 'John Smith', planDate: getTodayStr(0), actualDate: getTodayStr(0), priority: 'Low', keterangan: 'Follow up order' }
      ],
      aktifitas: [
        { id: 'ACT001', kontakToko: 'RTL001', namaToko: 'Toko Sumber Wangi', tanggalKunjungan: '2026-06-01', orderKe: '1', jenisKunjungan: 'Routine Visit', aktifitas: 'Inventory Check', kategoriSampling: 'Product Sample', sampleDesc: '50ml Tester', size: '50ml', keluhan: '', linkFoto: '', keterangan: 'Stock OK', status: 'Completed' }
      ],
      inteligence: [
        { id: 'INT001', date: '2026-06-01', kontakToko: 'RTL001', namaToko: 'Toko Sumber Wangi', kompetitor: 'Competitor A', aktivitasKompetitor: 'Promotion', keterangan: 'Running 20% discount promo.' }
      ]
    };

    // State
    let db = {};

    function initApp() {
      const stored = localStorage.getItem(STORE_KEY);
      if (!stored) {
        localStorage.setItem(STORE_KEY, JSON.stringify(defaultData));
        db = defaultData;
      } else {
        db = JSON.parse(stored);
      }
      navigate('dashboard');
    }

    function saveData() {
      localStorage.setItem(STORE_KEY, JSON.stringify(db));
    }

    function getTodayStr(daysOffset = 0) {
      const d = new Date();
      d.setDate(d.getDate() + daysOffset);
      return d.toISOString().split('T')[0];
    }

    // ==========================================
    // NAVIGATION & UI HELPERS
    // ==========================================

    function navigate(page) {
      // Update active link
      document.querySelectorAll('.nav-link').forEach(el => {
        el.classList.remove('active');
        if(el.dataset.page === page) el.classList.add('active');
      });

      // Close mobile sidebar
      document.getElementById('sidebar').classList.remove('open');

      // Render page
      const content = document.getElementById('app-content');
      switch(page) {
        case 'dashboard': renderDashboard(content); break;
        case 'setup': renderSetup(content); break;
        case 'daftar-toko': renderDaftarToko(content); break;
        case 'visit-plan': renderVisitPlan(content); break;
        case 'aktifitas': renderAktifitas(content); break;
        case 'inteligence': renderInteligence(content); break;
        default: renderDashboard(content);
      }
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    function openModal(title, bodyHtml, footerHtml = '') {
      document.getElementById('modal-title').innerText = title;
      document.getElementById('modal-body').innerHTML = bodyHtml;
      document.getElementById('modal-footer').innerHTML = footerHtml;
      document.getElementById('modal-root').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal-root').classList.remove('active');
    }

    function toast(msg, type = 'success') {
      const el = document.createElement('div');
      el.className = `fixed bottom-4 right-4 p-4 rounded-lg shadow-lg text-white ${type === 'success' ? 'bg-green-600' : 'bg-red-600'} z-50 animate-pulse`;
      el.innerText = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    function getBadgeClass(status) {
      if(status === 'Active' || status === 'Visited' || status === 'Completed') return 'badge-green';
      if(status === 'Scheduled' || status === 'Pending') return 'badge-yellow';
      if(status === 'Inactive' || status === 'Overdue') return 'badge-red';
      return 'badge-blue';
    }

    function calculateVisitStatus(planDate, actualDate) {
      if(actualDate) return 'Visited';
      const today = new Date(); today.setHours(0,0,0,0);
      const plan = new Date(planDate); plan.setHours(0,0,0,0);
      if(plan < today) return 'Overdue';
      return 'Scheduled';
    }

    function calculateDaysDue(planDate) {
      const today = new Date(); today.setHours(0,0,0,0);
      const plan = new Date(planDate); plan.setHours(0,0,0,0);
      const diff = Math.ceil((plan - today) / (1000 * 60 * 60 * 24));
      return diff;
    }

    // ==========================================
    // DASHBOARD
    // ==========================================

    function renderDashboard(el) {
      // Calculations
      const totalToko = db.toko.length;
      const activeToko = db.toko.filter(t => t.status === 'Active').length;
      const inactiveToko = db.toko.filter(t => t.status === 'Inactive').length;
      
      let scheduled = 0, overdue = 0, visited = 0;
      db.visitPlan.forEach(v => {
        const s = calculateVisitStatus(v.planDate, v.actualDate);
        if(s === 'Scheduled') scheduled++;
        if(s === 'Overdue') overdue++;
        if(s === 'Visited') visited++;
      });

      const totalAktifitas = db.aktifitas.length;
      const totalSampling = db.aktifitas.filter(a => a.kategoriSampling).length;
      
      const kompetitorCount = {};
      db.inteligence.forEach(i => {
        kompetitorCount[i.kompetitor] = (kompetitorCount[i.kompetitor] || 0) + 1;
      });
      const topKompetitor = Object.entries(kompetitorCount).sort((a,b) => b[1] - a[1])[0];

      el.innerHTML = `
        <div class="mb-8">
          <h1 class="text-2xl font-bold text-white">Dashboard</h1>
          <p class="text-slate-400">Executive overview of retail support operations.</p>
        </div>

        <!-- KPIs -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
          <div class="card p-5 stat-card blue">
            <p class="text-slate-400 text-sm mb-1">Total Toko</p>
            <p class="text-3xl font-bold">${totalToko}</p>
            <p class="text-xs text-green-400 mt-2">${activeToko} Active</p>
          </div>
          <div class="card p-5 stat-card yellow">
            <p class="text-slate-400 text-sm mb-1">Scheduled Visits</p>
            <p class="text-3xl font-bold">${scheduled}</p>
            <p class="text-xs text-slate-400 mt-2">Upcoming plans</p>
          </div>
          <div class="card p-5 stat-card red">
            <p class="text-slate-400 text-sm mb-1">Overdue Visits</p>
            <p class="text-3xl font-bold">${overdue}</p>
            <p class="text-xs text-red-400 mt-2">Need attention</p>
          </div>
          <div class="card p-5 stat-card green">
            <p class="text-slate-400 text-sm mb-1">Visited</p>
            <p class="text-3xl font-bold">${visited}</p>
            <p class="text-xs text-slate-400 mt-2">Completed</p>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <!-- Recent Activities -->
          <div class="card">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center">
              <h3 class="font-semibold">Recent Activities</h3>
              <span class="text-xs text-blue-400 cursor-pointer hover:underline" onclick="navigate('aktifitas')">View All</span>
            </div>
            <div class="p-4">
              ${db.aktifitas.slice(0, 5).map(a => `
                <div class="flex items-center justify-between py-2 border-b border-slate-700/50 last:border-0">
                  <div>
                    <p class="text-sm font-medium">${a.namaToko}</p>
                    <p class="text-xs text-slate-400">${a.tanggalKunjungan}</p>
                  </div>
                  <span class="badge ${getBadgeClass(a.status)}">${a.status}</span>
                </div>
              `).join('')}
            </div>
          </div>

          <!-- Intelligence Summary -->
          <div class="card">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center">
              <h3 class="font-semibold">Intelligence Summary</h3>
              <span class="text-xs text-blue-400 cursor-pointer hover:underline" onclick="navigate('inteligence')">View All</span>
            </div>
            <div class="p-4">
              <div class="mb-4 flex justify-between items-center">
                <span class="text-slate-400 text-sm">Most Active Competitor:</span>
                <span class="badge badge-red">${topKompetitor ? topKompetitor[0] : 'N/A'}</span>
              </div>
              <p class="text-sm font-medium mb-2">Activity Distribution:</p>
              ${Object.entries(kompetitorCount).map(([k, v]) => `
                <div class="flex items-center gap-3 mb-2">
                  <span class="text-xs w-24 truncate">${k}</span>
                  <div class="flex-1 h-2 bg-slate-700 rounded-full overflow-hidden">
                    <div class="h-full bg-blue-500" style="width: ${(v/db.inteligence.length)*100}%"></div>
                  </div>
                  <span class="text-xs">${v}</span>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    // ==========================================
    // SETUP MODULE
    // ==========================================

    let currentSetupTab = 'statusToko';

    function renderSetup(el) {
      el.innerHTML = `
        <div class="mb-6">
          <h1 class="text-2xl font-bold text-white">Setup</h1>
          <p class="text-slate-400">Master data configuration for dropdowns.</p>
        </div>

        <div class="flex flex-wrap gap-2 mb-6">
          ${['statusToko', 'jenisKunjungan', 'orderKe', 'kategoriSampling', 'taskCategories', 'kompetitor', 'users'].map(key => `
            <button onclick="switchSetupTab('${key}')" class="px-4 py-2 rounded-lg text-sm font-medium transition ${currentSetupTab === key ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}">
              ${key.replace(/([A-Z])/g, ' $1').trim()}
            </button>
          `).join('')}
        </div>

    function editSetupItem(idx) {
      const val = db.setup[currentSetupTab][idx];
      openModal('Edit Item', 
        `<input id="setup-input" type="text" class="input-field" value="${val}">`,
        `<button onclick="closeModal()" class="btn btn-secondary">Cancel</button><button onclick="saveSetupItem(${idx})" class="btn btn-primary">Update</button>`
      );
    }

    function saveSetupItem(idx) {
      const val = document.getElementById('setup-input').value.trim();
      if(!val) return;
      
      if(idx === -1) {
        db.setup[currentSetupTab].push(val);
      } else {
        db.setup[currentSetupTab][idx] = val;
      }
      saveData();
      closeModal();
      renderSetupList();
    }

    function deleteSetupItem(idx) {
      if(confirm('Delete this item?')) {
        db.setup[currentSetupTab].splice(idx, 1);
        saveData();
        renderSetupList();
      }
    }

    function saveToko(id) {
      const data = {
        id: document.getElementById('t-id').value,
        namaToko: document.getElementById('t-nama').value,
        contactPerson: document.getElementById('t-cp').value,
        phone: document.getElementById('t-phone').value,

        kodeKontak: `${document.getElementById('t-id').value}-${document.getElementById('t-cp').value.split(' ')[0].toUpperCase()}`
      };

      if(!data.id || !data.namaToko) return alert('ID and Nama Toko are required');

      if(id) {
        const idx = db.toko.findIndex(x => x.id === id);
        data.lastVisit = db.toko[idx].lastVisit; // Preserve last visit
        db.toko[idx] = data;
      } else {
        data.lastVisit = '';
        db.toko.push(data);
      }
      
      saveData();
      closeModal();
      navigate('daftar-toko');

    function saveVisit(id) {
      const sel = document.getElementById('v-toko');
      const data = {
        id: id || 'VP' + Date.now(),
        kontakToko: sel.value,
        namaToko: sel.options[sel.selectedIndex].dataset.name,
        tujuanKunjungan: document.getElementById('v-tujuan').value,

        planDate: document.getElementById('v-plan').value,
        priority: document.getElementById('v-priority').value,
        keterangan: document.getElementById('v-ket').value,
        actualDate: ''
      };

      if(id) {
        const idx = db.visitPlan.findIndex(x => x.id === id);
        data.actualDate = db.visitPlan[idx].actualDate; // Preserve actual
        db.visitPlan[idx] = data;
      } else {
        db.visitPlan.push(data);
      }
      
      saveData();
      closeModal();
      navigate('visit-plan');
    }

    function markVisited(id) {
      const v = db.visitPlan.find(x => x.id === id);
      v.actualDate = getTodayStr();
      v.status = 'Visited';
      
      // Update Last Visit in Toko
      const t = db.toko.find(x => x.id === v.kontakToko);
      if(t) t.lastVisit = v.actualDate;
      
      saveData();
      navigate('visit-plan');
      toast('Visit marked as completed');
    }

            <div>
              <label class="block text-sm text-slate-400 mb-1">Aktifitas *</label>
              <input id="a-akt" type="text" class="input-field" placeholder="e.g. Sales Visit">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm text-slate-400 mb-1">Kategori Sampling</label>
              <select id="a-kat" class="input-field">
                <option value="">None</option>
                ${db.setup.kategoriSampling.map(k => `<option>${k}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="block text-sm text-slate-400 mb-1">Size</label>
              <input id="a-size" type="text" class="input-field" placeholder="e.g. 50ml">
            </div>
          </div>
          <div>
            <label class="block text-sm text-slate-400 mb-1">Keluhan & Feedback</label>
            <textarea id="a-feedback" class="input-field" rows="2"></textarea>
          </div>
          <div>
            <label class="block text-sm text-slate-400 mb-1">Keterangan</label>
            <textarea id="a-ket" class="input-field" rows="2"></textarea>
          </div>
        </div>
      `;

      openModal('Log Activity', body, 
        `<button onclick="closeModal()" class="btn btn-secondary">Cancel</button>
         <button onclick="saveAktifitas()" class="btn btn-primary">Save</button>`
      );
    }

    function saveAktifitas() {
      const sel = document.getElementById('a-toko');
      const data = {
        id: 'ACT' + Date.now(),
        kontakToko: sel.value,
        namaToko: sel.options[sel.selectedIndex].dataset.name,
        tanggalKunjungan: document.getElementById('a-date').value,
        jenisKunjungan: document.getElementById('a-jenis').value,
        aktifitas: document.getElementById('a-akt').value,
        kategoriSampling: document.getElementById('a-kat').value,
        size: document.getElementById('a-size').value,
        keluhan: document.getElementById('a-feedback').value,
        keterangan: document.getElementById('a-ket').value,
        status: 'Completed'
      };

      if(!data.kontakToko || !data.tanggalKunjungan || !data.aktifitas) return alert('Please fill required fields');

      db.aktifitas.unshift(data);

      // BUSINESS RULE: Update Last Visit in Daftar Toko
      const t = db.toko.find(x => x.id === data.kontakToko);
      if(t) t.lastVisit = data.tanggalKunjungan;
      
      // Update Visit Plan Status if exists
      const v = db.visitPlan.find(x => x.kontakToko === data.kontakToko && !x.actualDate);
      if(v) {
        v.actualDate = data.tanggalKunjungan;
        v.status = 'Visited';
      }

      saveData();
      closeModal();
      navigate('aktifitas');
      toast('Activity saved & Last Visit updated');
    }

    function viewAktifitas(id) {
      const a = db.aktifitas.find(x => x.id === id);
      openModal(a.namaToko, `
        <div class="space-y-3 text-sm">
          <div class="flex justify-between"><span class="text-slate-400">Date:</span><span class="font-mono">${a.tanggalKunjungan}</span></div>
          <div class="flex justify-between"><span class="text-slate-400">Activity:</span><span>${a.aktifitas}</span></div>
          <div class="flex justify-between"><span class="text-slate-400">Jenis:</span><span>${a.jenisKunjungan}</span></div>
          ${a.kategoriSampling ? `<div class="flex justify-between"><span class="text-slate-400">Sampling:</span><span>${a.kategoriSampling} (${a.size})</span></div>` : ''}
          ${a.keluhan ? `<div class="bg-yellow-900/20 p-2 rounded border border-yellow-800"><span class="text-yellow-400 text-xs">Feedback:</span><p>${a.keluhan}</p></div>` : ''}
          ${a.keterangan ? `<p class="text-slate-300 mt-2">${a.keterangan}</p>` : ''}
        </div>
      `, `<button onclick="closeModal()" class="btn btn-primary">Close</button>`);
    }

    function deleteAktifitas(id) {
      if(confirm('Delete this activity?')) {
        db.aktifitas = db.aktifitas.filter(a => a.id !== id);
        saveData();
        navigate('aktifitas');
      }
    }

    // ==========================================
    // INTELEGENCE REPORT MODULE
    // ==========================================

    function renderInteligence(el) {
      el.innerHTML = `
        <div class="flex justify-between items-center mb-6">
          <div>
            <h1 class="text-2xl font-bold text-white">Intelegence Report</h1>
            <p class="text-slate-400">Competitor activity monitoring.</p>
          </div>
          <button onclick="openInteligenceModal()" class="btn btn-primary">Add Report</button>
        </div>

        <div class="card overflow-hidden">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Store</th>
                  <th>Kompetitor</th>
                  <th>Activity</th>
                  <th>Detail</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                ${db.inteligence.map(i => `
                  <tr>
                    <td class="font-mono text-sm">${i.date}</td>
                    <td class="font-medium">${i.namaToko}</td>
                    <td><span class="badge badge-red">${i.kompetitor}</span></td>
                    <td>${i.aktivitasKompetitor}</td>
                    <td class="truncate max-w-xs text-slate-400">${i.keterangan}</td>
                    <td>
                      <button onclick="viewInteligence('${i.id}')" class="p-2 hover:bg-slate-700 rounded text-slate-400"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg></button>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function openInteligenceModal() {
      const body = `
        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm text-slate-400 mb-1">Date</label>
              <input id="i-date" type="date" class="input-field" value="${getTodayStr()}">
            </div>
            <div>
              <label class="block text-sm text-slate-400 mb-1">Store *</label>
              <select id="i-toko" class="input-field" onchange="document.getElementById('i-toko-name').value = this.options[this.selectedIndex].dataset.name">
                <option value="">Select...</option>
                ${db.toko.map(t => `<option value="${t.id}" data-name="${t.namaToko}">${t.namaToko}</option>`).join('')}
              </select>
              <input type="hidden" id="i-toko-name">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm text-slate-400 mb-1">Kompetitor *</label>
              <select id="i-komp" class="input-field">
                ${db.setup.kompetitor.map(k => `<option>${k}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="block text-sm text-slate-400 mb-1">Aktivitas Kompetitor</label>
              <input id="i-akt" type="text" class="input-field" placeholder="e.g. Promo, Price Drop">
            </div>
          </div>
          <div>
            <label class="block text-sm text-slate-400 mb-1">Keterangan Detail *</label>
            <textarea id="i-ket" class="input-field" rows="3"></textarea>
          </div>
        </div>
      `;

      openModal('Add Intelligence Report', body, 
        `<button onclick="closeModal()" class="btn btn-secondary">Cancel</button>
         <button onclick="saveInteligence()" class="btn btn-primary">Save</button>`
      );
    }

    function saveInteligence() {
      const sel = document.getElementById('i-toko');
      const data = {
        id: 'INT' + Date.now(),
        date: document.getElementById('i-date').value,
        kontakToko: sel.value,
        namaToko: sel.options[sel.selectedIndex].dataset.name,
        kompetitor: document.getElementById('i-komp').value,
        aktivitasKompetitor: document.getElementById('i-akt').value,
        keterangan: document.getElementById('i-ket').value
      };

      if(!data.kontakToko || !data.keterangan) return alert('Please fill required fields');

      db.inteligence.unshift(data);
      saveData();
      closeModal();
      navigate('inteligence');
    }

    function viewInteligence(id) {
      const i = db.inteligence.find(x => x.id === id);
      openModal(`Report: ${i.kompetitor}`, `
        <div class="space-y-2 text-sm">
          <p><span class="text-slate-400">Store:</span> ${i.namaToko}</p>
          <p><span class="text-slate-400">Activity:</span> ${i.aktivitasKompetitor}</p>
          <div class="mt-4 p-3 bg-slate-800 rounded-lg">
            <p class="text-slate-300">${i.keterangan}</p>
          </div>
        </div>
      `, `<button onclick="closeModal()" class="btn btn-primary">Close</button>`);
    }

    // Initialize Application
    initApp();

  </script>
</body>
</html>
