<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retail Support CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            body: ['IBM Plex Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --bg-primary: #0a0f1a;
      --bg-secondary: #111827;
      --bg-card: #1a2234;
      --bg-elevated: #232d42;
      --fg-primary: #f1f5f9;
      --fg-secondary: #94a3b8;
      --fg-muted: #64748b;
      --accent: #10b981;
      --accent-hover: #059669;
      --accent-glow: rgba(16, 185, 129, 0.2);
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --border: #2d3a52;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg-primary);
      color: var(--fg-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .font-display {
      font-family: 'Space Grotesk', sans-serif;
    }

    /* Background atmosphere */
    .bg-atmosphere {
      background: 
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(16, 185, 129, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
        var(--bg-primary);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--fg-muted);
    }

    /* Sidebar */
    .sidebar {
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
    }

    .nav-item {
      transition: all 0.2s ease;
      border-left: 3px solid transparent;
    }

    .nav-item:hover {
      background: var(--bg-card);
      border-left-color: var(--accent);
    }

    .nav-item.active {
      background: var(--accent-glow);
      border-left-color: var(--accent);
      color: var(--accent);
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    /* KPI Cards */
    .kpi-card {
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-elevated) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }

    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.3;
    }

    .kpi-card.accent::before { background: var(--accent); }
    .kpi-card.warning::before { background: var(--warning); }
    .kpi-card.danger::before { background: var(--danger); }
    .kpi-card.info::before { background: var(--info); }

    /* Buttons */
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 500;
      transition: all 0.2s ease;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg-primary);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--fg-primary);
    }

    .btn-secondary:hover {
      background: var(--border);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid var(--danger);
      color: var(--danger);
    }

    .btn-danger:hover {
      background: var(--danger);
      color: white;
    }

    /* Form inputs */
    .form-input {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--fg-primary);
      width: 100%;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .form-input::placeholder {
      color: var(--fg-muted);
    }

    /* Tables */
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }

    .data-table th {
      background: var(--bg-secondary);
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: var(--fg-secondary);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .data-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--fg-primary);
    }

    .data-table tr:hover td {
      background: var(--bg-elevated);
    }

    /* Status badges */
    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .badge-success {
      background: rgba(16, 185, 129, 0.2);
      color: var(--accent);
    }

    .badge-warning {
      background: rgba(245, 158, 11, 0.2);
      color: var(--warning);
    }

    .badge-danger {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }

    .badge-info {
      background: rgba(59, 130, 246, 0.2);
      color: var(--info);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(0.9) translateY(20px);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal {
      transform: scale(1) translateY(0);
    }

    /* Tab navigation */
    .tab-nav {
      display: flex;
      gap: 4px;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: 10px;
    }

    .tab-btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 500;
      color: var(--fg-secondary);
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .tab-btn:hover {
      color: var(--fg-primary);
    }

    .tab-btn.active {
      background: var(--accent);
      color: var(--bg-primary);
    }

    /* Charts */
    .chart-bar {
      height: 8px;
      background: var(--bg-elevated);
      border-radius: 4px;
      overflow: hidden;
    }

    .chart-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .animate-in {
      animation: fadeInUp 0.4s ease forwards;
    }

    .stagger-1 { animation-delay: 0.1s; opacity: 0; }
    .stagger-2 { animation-delay: 0.2s; opacity: 0; }
    .stagger-3 { animation-delay: 0.3s; opacity: 0; }
    .stagger-4 { animation-delay: 0.4s; opacity: 0; }

    /* Mobile sidebar */
    .mobile-sidebar {
      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }

    .mobile-sidebar.open {
      transform: translateX(0);
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

    // Helper functions
    function formatDate(date) {
      return date.toISOString().split('T')[0];
    }

    function addDays(date, days) {
      const result = new Date(date);
      result.setDate(result.getDate() + days);
      return result;
    }

    function getData(key) {
      return JSON.parse(localStorage.getItem(key) || '[]');
    }

    function setData(key, data) {
      localStorage.setItem(key, JSON.stringify(data));
    }

    function generateId(prefix) {
      return prefix + Date.now().toString(36).toUpperCase();
    }

    // ============================================
    // NAVIGATION
    // ============================================
    
    let currentPage = 'dashboard';

    function navigateTo(page) {
      currentPage = page;
      
      // Update nav items
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
        if (item.dataset.page === page) {
          item.classList.add('active');
        }
      });

      // Close mobile sidebar
      closeMobileSidebar();

      // Render page
      renderPage(page);
    }

    function renderPage(page) {
      const content = document.getElementById('pageContent');
      
      switch(page) {
        case 'dashboard':
          renderDashboard(content);
          break;
        case 'setup':
          renderSetup(content);
          break;
        case 'stores':
          renderStores(content);
          break;
        case 'visits':
          renderVisits(content);
          break;
        case 'activities':
          renderActivities(content);
          break;
        case 'intelligence':
          renderIntelligence(content);
          break;
        default:
          renderDashboard(content);
      }
    }

              </div>
              <div class="flex items-center justify-between">

    // ============================================

    // ============================================
    
    function renderSetup(container) {
      const setup = getData('crm_setup');
      
      container.innerHTML = `
        <div class="mb-8">
          <h1 class="font-display text-3xl font-bold mb-2">Setup</h1>
          <p class="text-[var(--fg-secondary)]">Manage system configuration and master data.</p>
        </div>

        <div class="tab-nav mb-6 overflow-x-auto">
          <button class="tab-btn active" onclick="switchSetupTab('storeStatus', this)">Store Status</button>
          <button class="tab-btn" onclick="switchSetupTab('visitTypes', this)">Visit Types</button>
          <button class="tab-btn" onclick="switchSetupTab('samplingCategories', this)">Sampling Categories</button>
          <button class="tab-btn" onclick="switchSetupTab('taskCategories', this)">Task Categories</button>
          <button class="tab-btn" onclick="switchSetupTab('competitorList', this)">Competitor List</button>
          <button class="tab-btn" onclick="switchSetupTab('userList', this)">User List</button>
        </div>

        <div id="setupContent" class="card p-6">
          ${renderSetupTab('storeStatus', setup.storeStatus)}
        </div>
      `;
    }

    function switchSetupTab(tab, btn) {
      const setup = getData('crm_setup');
      
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      document.getElementById('setupContent').innerHTML = renderSetupTab(tab, setup[tab]);
    }

        <div class="flex items-center justify-between mb-6">

    function formatTabName(tab) {
      const names = {
        storeStatus: 'Store Status',
        visitTypes: 'Visit Types',
        samplingCategories: 'Sampling Categories',
        taskCategories: 'Task Categories',
        competitorList: 'Competitor List',
        userList: 'User List'
      };
      return names[tab] || tab;
    }

    function openSetupModal(tab, index = null) {
      const setup = getData('crm_setup');
      const data = setup[tab];
      const isEdit = index !== null;
      const isUserList = tab === 'userList';
      
      const item = isEdit ? data[index] : null;
      
      const modalContent = isUserList ? `
        <div class="p-6 border-b border-[var(--border)]">
          <h3 class="font-display text-xl font-bold">${isEdit ? 'Edit User' : 'Add New User'}</h3>

            <label class="block text-sm text-[var(--fg-secondary)] mb-2">User ID</label>
            <input type="text" name="id" class="form-input" value="${item?.id || ''}" ${isEdit ? 'readonly' : ''} required>

          <div>
            <label class="block text-sm text-[var(--fg-secondary)] mb-2">Name</label>
            <input type="text" name="name" class="form-input" value="${item?.name || ''}" required>

          <div>
            <label class="block text-sm text-[var(--fg-secondary)] mb-2">Role</label>
            <select name="role" class="form-input" required>
              <option value="">Select Role</option>
              <option value="Admin" ${item?.role === 'Admin' ? 'selected' : ''}>Admin</option>
              <option value="Sales Rep" ${item?.role === 'Sales Rep' ? 'selected' : ''}>Sales Rep</option>
              <option value="Merchandiser" ${item?.role === 'Merchandiser' ? 'selected' : ''}>Merchandiser</option>

          </div>

          </div>
        </form>
      ` : `
        <div class="p-6 border-b border-[var(--border)]">
          <h3 class="font-display text-xl font-bold">${isEdit ? 'Edit' : 'Add New'} ${formatTabName(tab)}</h3>

    function filterStores() {

      if (search) {

          s.storeName.toLowerCase().includes(search) ||
          s.contactPerson.toLowerCase().includes(search) ||
          s.location.toLowerCase().includes(search) ||
          s.contactId.toLowerCase().includes(search)
        );

      if (statusFilter) {
        stores = stores.filter(s => s.storeStatus === statusFilter);
      }
      
      document.getElementById('storesTableBody').innerHTML = renderStoreRows(stores);

    function saveStore(e, contactId) {
      e.preventDefault();
      const form = e.target;
      
      const store = {
        contactId: form.contactId.value,
        storeName: form.storeName.value,
        contactPerson: form.contactPerson.value,
        jobTitle: form.jobTitle.value,
        phone: form.phone.value,
        location: form.location.value,
        orderSequence: parseInt(form.orderSequence.value) || 1,
        storeStatus: form.storeStatus.value,
        visitType: form.visitType.value,
        assignedPIC: form.assignedPIC.value,
        googleMapsUrl: form.googleMapsUrl.value,
        visitTarget: parseInt(form.visitTarget.value) || 1,
        lastVisitDate: '',
        contactKey: `${form.contactId.value}-${form.contactPerson.value.split(' ')[0].toUpperCase()}`
      };
      
      const stores = getData('crm_stores');
      
      if (contactId) {
        const index = stores.findIndex(s => s.contactId === contactId);
        store.lastVisitDate = stores[index].lastVisitDate;
        stores[index] = store;
      } else {
        stores.push(store);
      }
      
      setData('crm_stores', stores);
      closeModal();
      renderStores(document.getElementById('pageContent'));
    }

    function deleteStore(contactId) {
      if (!confirm('Are you sure you want to delete this store? This action cannot be undone.')) return;
      
      const stores = getData('crm_stores');

    // ============================================
    // VISIT PLAN MODULE
    // ============================================
    
    function renderVisits(container) {
      const visits = getData('crm_visits');
      const setup = getData('crm_setup');
      const today = new Date();
      
      // Update visit statuses
      visits.forEach(v => {
        const plannedDate = new Date(v.plannedDate);
        if (v.status !== 'Visited') {
          if (plannedDate < today) {
            v.status = 'Overdue';
          } else {
            v.status = 'Scheduled';
          }
        }
        v.daysUntilDue = Math.ceil((plannedDate - today) / (1000 * 60 * 60 * 24));
      });
      setData('crm_visits', visits);
      
      container.innerHTML = `
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
          <div>
            <h1 class="font-display text-3xl font-bold mb-2">Visit Plan</h1>
            <p class="text-[var(--fg-secondary)]">Schedule and track store visits.</p>
          </div>
          <button onclick="openVisitModal()" class="btn btn-primary">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Plan Visit
          </button>
        </div>

        <!-- Filters -->
        <div class="card p-4 mb-6">
          <div class="flex flex-col sm:flex-row gap-4">
            <div class="flex-1">
              <input type="text" id="visitSearch" placeholder="Search visits..." class="form-input" oninput="filterVisits()">
            </div>
            <select id="visitPicFilter" class="form-input sm:w-40" onchange="filterVisits()">
              <option value="">All PIC</option>
              ${setup.userList.map(u => `<option value="${u.name}">${u.name}</option>`).join('')}
            </select>
            <select id="visitStatusFilter" class="form-input sm:w-40" onchange="filterVisits()">
              <option value="">All Status</option>
              <option value="Scheduled">Scheduled</option>
              <option value="Visited">Visited</option>
              <option value="Overdue">Overdue</option>
            </select>
          </div>
        </div>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
          <div class="kpi-card info p-4">
            <p class="text-[var(--fg-muted)] text-sm">Scheduled</p>
            <p class="font-display text-2xl font-bold">${visits.filter(v => v.status === 'Scheduled').length}</p>
          </div>
          <div class="kpi-card accent p-4">
            <p class="text-[var(--fg-muted)] text-sm">Visited</p>
            <p class="font-display text-2xl font-bold">${visits.filter(v => v.status === 'Visited').length}</p>
          </div>
          <div class="kpi-card danger p-4">
            <p class="text-[var(--fg-muted)] text-sm">Overdue</p>
            <p class="font-display text-2xl font-bold">${visits.filter(v => v.status === 'Overdue').length}</p>
          </div>
        </div>

        <!-- Table -->
        <div class="card overflow-hidden">
          <div class="overflow-x-auto">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Store</th>
                  <th>Purpose</th>
                  <th>PIC</th>
                  <th>Planned Date</th>
                  <th>Priority</th>
                  <th>Status</th>
                  <th>Days Due</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="visitsTableBody">
                ${renderVisitRows(visits)}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderVisitRows(visits) {
      return visits.map(v => `

          <td>${v.visitPurpose}</td>
          <td>${v.pic}</td>

          <td><span class="badge ${v.status === 'Visited' ? 'badge-success' : v.status === 'Overdue' ? 'badge-danger' : 'badge-warning'}">${v.status}</span></td>
          <td class="${v.daysUntilDue < 0 ? 'text-[var(--danger)]' : v.daysUntilDue === 0 ? 'text-[var(--warning)]' : ''}">${v.daysUntilDue} days</td>
          <td>
            <div class="flex gap-2">
              ${v.status !== 'Visited' ? `
                <button onclick="completeVisit('${v.id}')" class="p-2 rounded hover:bg-[var(--accent)]/20 text-[var(--accent)]" title="Mark as Visited">

                </svg>
              </button>
              <button onclick="deleteVisit('${v.id}')" class="p-2 rounded hover:bg-[var(--danger)]/20 text-[var(--danger)]" title="Delete">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
              </button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function filterVisits() {
      const search = document.getElementById('visitSearch').value.toLowerCase();
      const picFilter = document.getElementById('visitPicFilter').value;
      const statusFilter = document.getElementById('visitStatusFilter').value;
      
      let visits = getData('crm_visits');
      
      if (search) {
        visits = visits.filter(v => 
          v.storeName.toLowerCase().includes(search) ||
          v.visitPurpose.toLowerCase().includes(search) ||
          v.pic.toLowerCase().includes(search)
        );
      }
      
      if (picFilter) {

    function saveVisit(e, id) {
      e.preventDefault();
      const form = e.target;
      const storeSelect = form.storeId;
      const selectedOption = storeSelect.options[storeSelect.selectedIndex];
      
      const today = new Date();
      const plannedDate = new Date(form.plannedDate.value);
      
      const visit = {
        id: id || generateId('VP'),
        storeId: form.storeId.value,
        storeName: selectedOption.dataset.name || '',
        visitPurpose: form.visitPurpose.value,
        pic: form.pic.value,
        plannedDate: form.plannedDate.value,
        actualVisitDate: '',
        priority: form.priority.value,
        status: 'Scheduled',
        notes: form.notes.value,
        daysUntilDue: Math.ceil((plannedDate - today) / (1000 * 60 * 60 * 24))
      };
      
      const visits = getData('crm_visits');
      
      if (id) {
        const index = visits.findIndex(v => v.id === id);
        visits[index] = { ...visits[index], ...visit };
      } else {
        visits.push(visit);
      }
      
      setData('crm_visits', visits);
      closeModal();
      renderVisits(document.getElementById('pageContent'));
    }

    function editVisit(id) {
      openVisitModal(id);
    }

    function deleteVisit(id) {
      if (!confirm('Are you sure you want to delete this visit?')) return;
      
      const visits = getData('crm_visits');
      const index = visits.findIndex(v => v.id === id);
      visits.splice(index, 1);
      setData('crm_visits', visits);
      
      renderVisits(document.getElementById('pageContent'));
    }

    function completeVisit(id) {
      const visits = getData('crm_visits');
      const visit = visits.find(v => v.id === id);
      visit.status = 'Visited';
      visit.actualVisitDate = formatDate(new Date());
      setData('crm_visits', visits);
      
      // Update store last visit date
      const stores = getData('crm_stores');
      const store = stores.find(s => s.contactId === visit.storeId);
      if (store) {
        store.lastVisitDate = visit.actualVisitDate;
        setData('crm_stores', stores);
      }
      
      renderVisits(document.getElementById('pageContent'));
    }

    function saveActivity(e, id) {
      e.preventDefault();
      const form = e.target;
      const storeSelect = form.storeId;
      const selectedOption = storeSelect.options[storeSelect.selectedIndex];
      
      const activity = {
        id: id || generateId('ACT'),
        storeId: form.storeId.value,
        storeName: selectedOption.dataset.name || '',
        visitDate: form.visitDate.value,
        orderSequence: parseInt(form.orderSequence.value) || 1,
        visitType: form.visitType.value,
        activity: form.activity.value,
        samplingCategory: form.samplingCategory.value,
        sampleDescription: form.sampleDescription.value,
        productSize: form.productSize.value,
        complaintFeedback: form.complaintFeedback.value,
        photoAttachment: '',
        notes: form.notes.value,
        status: 'Completed'
      };
      
      const activities = getData('crm_activities');
      
      if (id) {
        const index = activities.findIndex(a => a.id === id);
        activities[index] = activity;
      } else {
        activities.unshift(activity);
      }
      
      setData('crm_activities', activities);
      
      // Update store last visit date
      const stores = getData('crm_stores');
      const store = stores.find(s => s.contactId === activity.storeId);
      if (store) {
        store.lastVisitDate = activity.visitDate;
        setData('crm_stores', stores);
      }
      
      // Update visit plan if exists
      const visits = getData('crm_visits');
      const visit = visits.find(v => v.storeId === activity.storeId && v.status !== 'Visited');
      if (visit) {
        visit.status = 'Visited';
        visit.actualVisitDate = activity.visitDate;
        setData('crm_visits', visits);
      }
      
      closeModal();
      renderActivities(document.getElementById('pageContent'));
    }

          <div>
            <label class="block text-sm text-[var(--fg-secondary)] mb-2">Detailed Notes *</label>
            <textarea name="detailedNotes" class="form-input" rows="4" required>${intel?.detailedNotes || ''}</textarea>
          </div>
          <div class="flex gap-3 pt-4">
            <button type="button" onclick="closeModal()" class="btn btn-secondary flex-1">Cancel</button>
            <button type="submit" class="btn btn-primary flex-1">${isEdit ? 'Update' : 'Submit Report'}</button>
          </div>
        </form>
      `;
      
      document.getElementById('modalContent').innerHTML = modalContent;
      document.getElementById('modalOverlay').classList.add('active');
    }

    function saveIntel(e, id) {
      e.preventDefault();
      const form = e.target;
      const storeSelect = form.storeId;
      const selectedOption = storeSelect.options[storeSelect.selectedIndex];
      
      const intel = {
        id: id || generateId('INT'),
        date: form.date.value,
        storeId: form.storeId.value,
        storeName: selectedOption.dataset.name || '',
        competitor: form.competitor.value,
        competitorActivity: form.competitorActivity.value,
        detailedNotes: form.detailedNotes.value
      };
      
      const intelligence = getData('crm_intelligence');
      
      if (id) {
        const index = intelligence.findIndex(i => i.id === id);
        intelligence[index] = intel;
      } else {
        intelligence.unshift(intel);
      }
      
      setData('crm_intelligence', intelligence);
      closeModal();
      renderIntelligence(document.getElementById('pageContent'));
    }

    function viewIntel(id) {
      const intelligence = getData('crm_intelligence');
      const intel = intelligence.find(i => i.id === id);
      
      const modalContent = `
        <div class="p-6 border-b border-[var(--border)]">
          <h3 class="font-display text-xl font-bold">${intel.competitor}</h3>
          <p class="text-[var(--fg-muted)]">${intel.date} - ${intel.storeName}</p>
        </div>
        <div class="p-6 space-y-4">
          <div>
            <p class="text-sm text-[var(--fg-muted)]">Activity Type</p>
            <p class="font-medium">${intel.competitorActivity}</p>
          </div>
          <div>
            <p class="text-sm text-[var(--fg-muted)]">Detailed Notes</p>
            <p class="font-medium">${intel.detailedNotes}</p>
          </div>
          <div class="flex gap-3 pt-4">
            <button onclick="closeModal()" class="btn btn-secondary flex-1">Close</button>
          </div>
        </div>
      `;
      
      document.getElementById('modalContent').innerHTML = modalContent;
      document.getElementById('modalOverlay').classList.add('active');
    }

    function deleteIntel(id) {
      if (!confirm('Are you sure you want to delete this report?')) return;
      
      const intelligence = getData('crm_intelligence');
      const index = intelligence.findIndex(i => i.id === id);
      intelligence.splice(index, 1);
      setData('crm_intelligence', intelligence);
      
      renderIntelligence(document.getElementById('pageContent'));
    }

    // ============================================
    // MODAL & MOBILE SIDEBAR
    // ============================================
    
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    function toggleMobileSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.toggle('open');
      overlay.classList.toggle('hidden');
    }

    function closeMobileSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.add('hidden');
    }

    // Close modal on overlay click
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // Mobile menu button
    document.getElementById('mobileMenuBtn').addEventListener('click', toggleMobileSidebar);

    // Keyboard navigation
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeModal();
        closeMobileSidebar();
      }
    });

    // ============================================
    // INITIALIZATION
    // ============================================
    
    // Initialize data on first load
    initializeData();
    
    // Set initial nav state
    document.querySelector('[data-page="dashboard"]').classList.add('active');
    
    // Render initial page
    renderPage('dashboard');
  </script>
</body>
</html>
